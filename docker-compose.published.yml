services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: immich-swipe-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  immich-swipe:
    image: goethenorris/swiparr:v6
    container_name: immich-swipe
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8080:80"
    environment:
      QDRANT_HOST: qdrant
      APP_DATA_DIR: /data
      AUTO_ARCHIVE_IMMICH_URL: ${AUTO_ARCHIVE_IMMICH_URL:-}
      AUTO_ARCHIVE_API_KEY: ${AUTO_ARCHIVE_API_KEY:-}
    volumes:
      - swiparr_data:/data
      - swiparr_models:/app/models

volumes:
  qdrant_storage:
  swiparr_data:
  swiparr_models: